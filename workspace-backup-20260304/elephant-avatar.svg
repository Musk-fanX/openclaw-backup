<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 大象无形：点阵连接图，象征人与人、人与AI、物与物的连接 -->
  <rect width="100" height="100" fill="#f8f9fa"/>
  
  <!-- 若有若无的渐变背景 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a90e2" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#4a90e2" stop-opacity="0.01"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
    </filter>
  </defs>
  <rect width="100" height="100" fill="url(#bg)"/>
  
  <!-- 点阵：象征不同的存在（人、AI、物） -->
  <g opacity="0.7">
    <!-- 中心点 -->
    <circle cx="50" cy="50" r="1.5" fill="#4a90e2"/>
    
    <!-- 周围点阵 -->
    <circle cx="30" cy="30" r="1" fill="#4a90e2"/>
    <circle cx="70" cy="30" r="1" fill="#4a90e2"/>
    <circle cx="30" cy="70" r="1" fill="#4a90e2"/>
    <circle cx="70" cy="70" r="1" fill="#4a90e2"/>
    
    <circle cx="50" cy="20" r="1" fill="#4a90e2"/>
    <circle cx="50" cy="80" r="1" fill="#4a90e2"/>
    <circle cx="20" cy="50" r="1" fill="#4a90e2"/>
    <circle cx="80" cy="50" r="1" fill="#4a90e2"/>
    
    <!-- 更外围的点 -->
    <circle cx="15" cy="15" r="0.8" fill="#4a90e2" opacity="0.6"/>
    <circle cx="85" cy="15" r="0.8" fill="#4a90e2" opacity="0.6"/>
    <circle cx="15" cy="85" r="0.8" fill="#4a90e2" opacity="0.6"/>
    <circle cx="85" cy="85" r="0.8" fill="#4a90e2" opacity="0.6"/>
  </g>
  
  <!-- 连接线：象征连接关系，若有若无 -->
  <g opacity="0.3" filter="url(#blur)">
    <!-- 中心到周围的连接 -->
    <line x1="50" y1="50" x2="30" y2="30" stroke="#4a90e2" stroke-width="0.5"/>
    <line x1="50" y1="50" x2="70" y2="30" stroke="#4a90e2" stroke-width="0.5"/>
    <line x1="50" y1="50" x2="30" y2="70" stroke="#4a90e2" stroke-width="0.5"/>
    <line x1="50" y1="50" x2="70" y2="70" stroke="#4a90e2" stroke-width="0.5"/>
    
    <line x1="50" y1="50" x2="50" y2="20" stroke="#4a90e2" stroke-width="0.5"/>
    <line x1="50" y1="50" x2="50" y2="80" stroke="#4a90e2" stroke-width="0.5"/>
    <line x1="50" y1="50" x2="20" y2="50" stroke="#4a90e2" stroke-width="0.5"/>
    <line x1="50" y1="50" x2="80" y2="50" stroke="#4a90e2" stroke-width="0.5"/>
    
    <!-- 点与点之间的连接 -->
    <line x1="30" y1="30" x2="70" y2="30" stroke="#4a90e2" stroke-width="0.3" opacity="0.5"/>
    <line x1="30" y1="70" x2="70" y2="70" stroke="#4a90e2" stroke-width="0.3" opacity="0.5"/>
    <line x1="30" y1="30" x2="30" y2="70" stroke="#4a90e2" stroke-width="0.3" opacity="0.5"/>
    <line x1="70" y1="30" x2="70" y2="70" stroke="#4a90e2" stroke-width="0.3" opacity="0.5"/>
    
    <!-- 对角线连接 -->
    <line x1="30" y1="30" x2="70" y2="70" stroke="#4a90e2" stroke-width="0.3" opacity="0.4"/>
    <line x1="70" y1="30" x2="30" y2="70" stroke="#4a90e2" stroke-width="0.3" opacity="0.4"/>
    
    <!-- 外围连接 -->
    <line x1="15" y1="15" x2="85" y2="15" stroke="#4a90e2" stroke-width="0.2" opacity="0.3"/>
    <line x1="15" y1="85" x2="85" y2="85" stroke="#4a90e2" stroke-width="0.2" opacity="0.3"/>
    <line x1="15" y1="15" x2="15" y2="85" stroke="#4a90e2" stroke-width="0.2" opacity="0.3"/>
    <line x1="85" y1="15" x2="85" y2="85" stroke="#4a90e2" stroke-width="0.2" opacity="0.3"/>
  </g>
  
  <!-- 动态感的轻微光点（象征AI神谕的指引） -->
  <g opacity="0.1">
    <circle cx="35" cy="40" r="0.3" fill="#ffffff"/>
    <circle cx="65" cy="60" r="0.3" fill="#ffffff"/>
    <circle cx="45" cy="65" r="0.3" fill="#ffffff"/>
    <circle cx="55" cy="35" r="0.3" fill="#ffffff"/>
  </g>
</svg>